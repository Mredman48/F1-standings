name: Run All Team Standings Script

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-all-teams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show repo files
        run: ls -la

      - name: Run all team standings script
        run: node updateAllTeamStandings.js

      - name: Show generated files
        if: always()
        run: |
          ls -la f1_*_standings.json || true

      - name: Commit updated JSON files
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add f1_redbull_standings.json \
                  f1_ferrari_standings.json \
                  f1_mercedes_standings.json \
                  f1_mclaren_standings.json \
                  f1_alpine_standings.json \
                  f1_astonmartin_standings.json \
                  f1_williams_standings.json \
                  f1_haas_standings.json \
                  f1_audi_standings.json \
                  f1_cadillac_standings.json \
                  f1_vcarb_standings.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update all team standings JSON files"
          git push