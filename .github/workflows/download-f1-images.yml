name: Download F1 Driver Images

on:
  workflow_dispatch:

jobs:
  download-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Download and Zip Images
        run: |
          python <<EOF
          import requests
          import zipfile
          import os

          urls = [
            
    # Alpine
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/alpine/piegas01/2026alpinepiegas01right.webp",
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/alpine/fracol01/2026alpinefracol01right.webp",

    # Aston Martin
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/astonmartin/feralo01/2026astonmartinferalo01right.webp",
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/astonmartin/lanstr01/2026astonmartinlanstr01right.webp",

    # Audi
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/audi/gabbot01/2026audigabbot01right.webp",
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/audi/nichul01/2026audinichul01right.webp",

    # Cadillac
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/cadillac/serper01/2026cadillacserper01right.webp",
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/cadillac/valbot01/2026cadillacvalbot01right.webp",

    # Ferrari
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/ferrari/charle01/2026ferraricharle01right.webp",
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/ferrari/lewham01/2026ferrarilewham01right.webp",

    # Haas
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/haas/estoco01/2026haasestoco01right.webp",
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/haas/olibea01/2026haasolibea01right.webp",

    # McLaren
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/mclaren/lannor01/2026mclarenlannor01right.webp",
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/mclaren/oscpia01/2026mclarenoscpia01right.webp",

    # Mercedes
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/mercedes/georus01/2026mercedesgeorus01right.webp",
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/mercedes/kimant01/2026mercedeskimant01right.webp",

    # Racing Bulls
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/racingbulls/liamlaw01/2026racingbullslia mlaw01right.webp",
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/racingbulls/arvlind01/2026racingbullsarvlind01right.webp",

    # Red Bull
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/redbull/maxver01/2026redbullmaxver01right.webp",
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/redbull/isahad01/2026redbullisahad01right.webp",

    # Williams
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/williams/alexal01/2026williamsalexal01right.webp",
    "https://media.formula1.com/image/upload/c_fill,w_720/q_auto/v1740000000/common/f1/2026/williams/carsai01/ ]

          zip_filename = "F1_2026_Driver_Images.zip"

          with zipfile.ZipFile(zip_filename, 'w') as zipf:
              for url in urls:
                  filename = url.split("/")[-1]
                  print(f"Downloading {filename}...")
                  response = requests.get(url)
                  if response.status_code == 200:
                      zipf.writestr(filename, response.content)
                  else:
                      print(f"Failed: {url}")

          print("ZIP created.")
          EOF

      - name: Commit ZIP file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add F1_2026_Driver_Images.zip
          git commit -m "Update F1 2026 driver images zip" || echo "No changes"
          git push
