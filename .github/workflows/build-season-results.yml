name: Build F1 Season Results

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: f1-season-results
  cancel-in-progress: false

jobs:
  build-season-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 🔍 DEBUG — shows EXACT file names + location
      - name: Debug file structure
        run: |
          echo "Current directory:"
          pwd
          echo ""
          echo "Repo root contents:"
          ls -la
          echo ""
          echo "All files (2 levels deep):"
          find . -maxdepth 2 -type f

      # 🚀 RUN SCRIPT (⚠️ EDIT THIS LINE IF NEEDED)
      - name: Run season results builder
        run: node buildSeasonResults.js

      - name: Commit updated season results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add f1_season_event_results.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update F1 season results"
          git push
