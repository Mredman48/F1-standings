steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Run Audi standings script
    run: node updateAudiStandings.js

  - name: Commit updated JSON
    run: |
      git config --global user.name "github-actions"
      git config --global user.email "actions@github.com"

      git add f1_audi_standings.json

      git commit -m "Update Audi standings JSON" || echo "No changes to commit"

      git push