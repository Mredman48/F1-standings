name: Update All F1 Data (Race Weekends Only)

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: f1-standings-publish
  cancel-in-progress: false

jobs:
  update-all:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # ------------------------------------------------
      # Gate 1: race weekend
      # ------------------------------------------------
      - name: Race weekend gate
        id: weekend
        run: node scripts/isRaceWeekend.mjs

      # ------------------------------------------------
      # Gate 2: OpenF1 lock check
      # ------------------------------------------------
      - name: OpenF1 availability check
        id: openf1
        run: |
          STATUS=$(curl -s -o /tmp/openf1.txt -w "%{http_code}" "https://api.openf1.org/v1/drivers?session_key=latest")

          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" = "401" ]; then
            echo "blocked=true" >> "$GITHUB_OUTPUT"
            echo "OpenF1 blocked due to live session."
          else
            echo "blocked=false" >> "$GITHUB_OUTPUT"
            echo "OpenF1 available."
          fi

      # ------------------------------------------------
      # Log skip reason
      # ------------------------------------------------
      - name: Skip reason
        if: steps.weekend.outputs.in_window != 'true' || steps.openf1.outputs.blocked == 'true'
        run: |
          echo "Skipping run."
          echo "in_window=${{ steps.weekend.outputs.in_window }}"
          echo "openf1_blocked=${{ steps.openf1.outputs.blocked }}"
          echo "openf1_status=${{ steps.openf1.outputs.status }}"
          exit 0

      # ------------------------------------------------
      # ONLY run scripts when BOTH gates pass
      # ------------------------------------------------
      - name: Run core update scripts
        if: steps.weekend.outputs.in_window == 'true' && steps.openf1.outputs.blocked != 'true'
        run: |
          node updateStandings.js
          node updateConstructors.js
          node updateNextRace.js
          node UpdateAllTeamStandings.js

      - name: Commit & Push
        if: steps.weekend.outputs.in_window == 'true' && steps.openf1.outputs.blocked != 'true'
        run: |
          set -e

          git config user.name "f1-bot"
          git config user.email "f1-bot@users.noreply.github.com"

          git add *.json headshots teamlogos driver-numbers trackmaps package-lock.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Automated F1 data update (race weekend)"

          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push failed (attempt $i). Rebasing..."
            git fetch origin main
            git rebase origin/main
            sleep $((i * 2))
          done

          echo "Push failed."
          exit 1