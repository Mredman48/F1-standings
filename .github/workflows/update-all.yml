name: Update F1 Data on Race Weekends

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  workflow_dispatch:

jobs:
  check-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Check if it's a race weekend
        id: check_race
        run: |
          node -e "
          import fs from 'fs/promises';
          import ical from 'node-ical';

          const ICS_URL = 'https://better-f1-calendar.vercel.app/api/calendar.ics';
          const now = new Date();

          const ics = await ical.async.fromURL(ICS_URL, { headers: { 'User-Agent': 'f1-standings-bot/1.0' } });
          const events = Object.values(ics).filter(e => e?.type === 'VEVENT');

          const upcomingWeekend = events.find(e => {
            const start = new Date(e.start);
            const end = new Date(e.end);
            return start <= now && now <= end;
          });

          if (!upcomingWeekend) {
            console.log('No race weekend currently. Exiting.');
            process.exit(78); // Neutral exit for GitHub Actions
          } else {
            console.log('Race weekend ongoing. Running updates.');
          }
          "

      - name: Run all update scripts
        if: ${{ success() }}
        run: |
          node updateStandings.js
          node updateConstructors.js
          node updateNextRace.js
          node updateRedBullStandings.js
          node updateFerrariStandings.js
          node updateMercedesStandings.js
          node updateMcLarenStandings.js
          node updateAlpineStandings.js
          node updateAstonMartinStandings.js
          node updateWilliamsStandings.js
          node updateHaasStandings.js
          node updateAudiStandings.js
          node updateCadillacStandings.js
          node UpdateVCARBStandings.js