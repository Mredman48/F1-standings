name: Update All F1 Data (Race Weekends Only)

on:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: f1-standings-publish
  cancel-in-progress: false

jobs:
  update-all:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # ---- Gate 1: only proceed on race weekends ----
      - name: Race weekend gate
        id: gate
        run: node scripts/isRaceWeekend.mjs

      - name: Skip (not race weekend)
        if: steps.gate.outputs.in_window != 'true' && github.event_name != 'workflow_dispatch'
        run: |
          echo "Not a race weekend window. Skipping updates."
          echo "window_start=${{ steps.gate.outputs.window_start }}"
          echo "window_end=${{ steps.gate.outputs.window_end }}"
          echo "next_race=${{ steps.gate.outputs.next_race }}"
          exit 0

      # ---- Gate 2: skip scheduled runs if OpenF1 is locked during a live session ----
      - name: OpenF1 live-session gate
        id: openf1_gate
        run: |
          STATUS=$(curl -s -o /tmp/openf1_body.txt -w "%{http_code}" "https://api.openf1.org/v1/drivers?session_key=latest")

          echo "openf1_status=$STATUS" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" = "401" ]; then
            echo "openf1_blocked=true" >> "$GITHUB_OUTPUT"
            echo "OpenF1 is locked during a live session. Skipping scheduled updates."
          else
            echo "openf1_blocked=false" >> "$GITHUB_OUTPUT"
            echo "OpenF1 is available."
          fi

      - name: Skip (live session in progress)
        if: steps.openf1_gate.outputs.openf1_blocked == 'true' && github.event_name != 'workflow_dispatch'
        run: |
          echo "Live session detected via OpenF1 401. Skipping this scheduled run."
          exit 0

      # ---------- RUN ALL UPDATE SCRIPTS ----------
      - name: Run all JS updates
        if: steps.openf1_gate.outputs.openf1_blocked != 'true' || github.event_name == 'workflow_dispatch'
        run: |
          node updateStandings.js
          node updateConstructors.js
          node updateNextRace.js
          node updateRedBullStandings.js
          node updateFerrariStandings.js
          node updateMercedesStandings.js
          node updateMcLarenStandings.js
          node updateAlpineStandings.js
          node updateAstonMartinStandings.js
          node updateWilliamsStandings.js
          node updateHaasStandings.js
          node updateAudiStandings.js
          node updateCadillacStandings.js
          node UpdateVCARBStandings.js

      # ---------- SINGLE COMMIT / PUSH ----------
      - name: Commit & Push (safe)
        if: steps.openf1_gate.outputs.openf1_blocked != 'true' || github.event_name == 'workflow_dispatch'
        run: |
          set -e

          git config user.name "f1-bot"
          git config user.email "f1-bot@users.noreply.github.com"

          git add *.json headshots teamlogos driver-numbers trackmaps package-lock.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Automated F1 data update (race weekend)"

          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push failed (attempt $i). Rebasing..."
            git fetch origin main
            git rebase origin/main
            sleep $((i * 2))
          done

          echo "Push failed after retries."
          exit 1