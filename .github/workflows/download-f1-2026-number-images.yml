name: Download F1 2026 Driver Number Images

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download number images
        run: |
          set -e
          mkdir -p numbers

          urls=(
          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/alpine/piegas01/2026alpinepiegas01numberwhite.webp"
          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/alpine/fracol01/2026alpinefracol01numberwhite.webp"

          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/astonmartin/feralo01/2026astonmartinferalo01numberwhite.webp"
          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/astonmartin/lanstr01/2026astonmartinlanstr01numberwhite.webp"

          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/audi/gabbor01/2026audigabbor01numberwhite.webp"
          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/audi/nichul01/2026audinichul01numberwhite.webp"

          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/cadillac/serper01/2026cadillacserper01numberwhite.webp"
          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/cadillac/valbot01/2026cadillacvalbot01numberwhite.webp"

          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/ferrari/chalec01/2026ferrarichalec01numberwhite.webp"
          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/ferrari/lewham01/2026ferrarilewham01numberwhite.webp"

          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/haas/estoco01/2026haasestoco01numberwhite.webp"
          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/haas/olibea01/2026haasolibea01numberwhite.webp"

          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/mclaren/lannor01/2026mclarenlannor01numberwhite.webp"
          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/mclaren/oscpia01/2026mclarenoscpia01numberwhite.webp"

          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/mercedes/georus01/2026mercedesgeorus01numberwhite.webp"
          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/mercedes/andant01/2026mercedesandant01numberwhite.webp"

          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/racingbulls/lialaw01/2026racingbullslialaw01numberwhite.webp"
          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/racingbulls/arvlind01/2026racingbullsarvlind01numberwhite.webp"

          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/redbullracing/maxver01/2026redbullracingmaxver01numberwhite.webp"
          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/redbullracing/isahad01/2026redbullracingisahad01numberwhite.webp"

          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/williams/alealb01/2026williamsalealb01numberwhite.webp"
          "https://media.formula1.com/image/upload/e_trim/c_fit,h_742/q_auto/v1740000000/common/f1/2026/williams/carsai01/2026williamscarsai01numberwhite.webp"
          )

          for url in "${urls[@]}"
          do
            filename=$(basename "$url")
            echo "Downloading $filename"
            curl -f -L "$url" -o "numbers/$filename"
          done

          zip -r F1_2026_Driver_Number_Images.zip numbers

      - name: Commit ZIP
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add F1_2026_Driver_Number_Images.zip
          git commit -m "Update F1 2026 driver number images zip" || echo "No changes"
          git push
